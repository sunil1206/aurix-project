# Aurix Frontend - nginx config (production image)
#
# Serves the SPA from /usr/share/nginx/html and reverse-proxies
# /api/* to the Django backend (default service name "web" on port 8000).
#
# History API routing: any unknown path falls through to index.html
# so React Router doesn't 404 on a refresh.

upstream aurix_backend {
    # In docker-compose.prod.yml the Django service is named "web".
    server web:8000;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip the obvious things
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 256;

    # Long cache for hashed assets, short for index.html
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Reverse-proxy the API to Django.
    location /api/ {
        proxy_pass         http://aurix_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — every unknown path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
