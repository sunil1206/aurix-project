# ============================================================
# Aurix - Local development stack
#
# Brings up Postgres + Redis + Django (web, runserver) + Vite
# (frontend, hot reload). Source trees are bind-mounted so edits
# auto-reload on both sides.
#
#   docker compose up --build           # foreground
#   docker compose up -d                 # background
#   docker compose logs -f web           # tail Django logs
#   docker compose logs -f frontend      # tail Vite logs
#   docker compose exec web bash         # shell into Django container
#
# Open the app at:
#   http://localhost:5173        (React SPA)
#   http://localhost:8000/api/   (Django API direct)
#
# For a production-shaped stack (gunicorn + nginx, no source mount):
#
#   docker compose -f docker-compose.prod.yml up --build
# ============================================================

services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aurix
      POSTGRES_USER: aurix
      POSTGRES_PASSWORD: aurix
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurix -d aurix"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    image: aurix-web:dev
    env_file: .env
    environment:
      # Dev settings module (SQLite would also work, but Postgres mirrors prod)
      DJANGO_SETTINGS_MODULE: aurix.settings.development
      DATABASE_URL: postgres://aurix:aurix@db:5432/aurix
      REDIS_URL: redis://redis:6379/0
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      # Hot reload: mount the source tree over the image's /app.
      - .:/app
    # Override the prod CMD (gunicorn) with runserver for autoreload.
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: aurix-frontend:dev
    environment:
      # Vite proxies /api -> the Django service via the docker network.
      VITE_API_PROXY_TARGET: http://web:8000
      # Empty BASE_URL => the SPA hits relative URLs that Vite proxies.
      VITE_API_BASE_URL: ""
      # Polling-based file watching is more reliable on Windows / WSL2 mounts.
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    depends_on:
      - web
    volumes:
      # Mount the source tree...
      - ./frontend:/app
      # ...but keep the container's node_modules (anonymous volume) so
      # the host's (possibly empty / OS-mismatched) node_modules doesn't
      # shadow the one installed in the image.
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
